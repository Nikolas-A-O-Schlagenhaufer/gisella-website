{% extends "layout.html" %} {% block content %} {% for post in posts %}
<article>
  <a href="#">{{ post.author }}</a>
  <h2><a href="{{ url_for('post', post_id=post.id) }}">{{ post.title }}</a></h2>
  <p>{{ post.content }}</p>
  <small>{{ post.date_posted }}</small>
</article>
{% endfor %} {% endblock content %}
