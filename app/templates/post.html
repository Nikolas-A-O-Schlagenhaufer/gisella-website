{% extends "layout.html" %} {% block content %}
<article>
  <div>
    <a href="{{ url_for('user_post', user_id=post.author.id) }}"
      >{{ post.author.username }}</a
    >
    <h2><a href="#">{{ post.title }}</a></h2>
    <p>{{ post.content }}</p>
    <small>{{ post.date_posted.date() }}</small>
  </div>
  <div></div>
</article>
{% endblock content %}
